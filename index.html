<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>IoT App</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
}

.center {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
}

input {
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.container {
  padding: 10px;
}

.card {
  background: rgba(255,255,255,0.1);
  margin: 10px;
  padding: 15px;
  border-radius: 15px;
}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="login" class="center">
  <h2>Connexion</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
</div>

<!-- APP -->
<div id="app" style="display:none">

<h1 style="text-align:center;">📱 IoT Dashboard</h1>

<div class="container">

<div class="card">
  <h3>ESP32</h3>
  <p>Temp: <span id="tempESP"></span></p>
  <p>Hum: <span id="humESP"></span></p>
</div>

<div class="card">
  <h3>Arduino Mega</h3>
  <p>Temp: <span id="tempMega"></span></p>
  <p>Hum: <span id="humMega"></span></p>
</div>

<div class="card">
  <h3>Lampe</h3>
  <p id="etatLampe"></p>
  <button onclick="lampeOn()">ON</button>
  <button onclick="lampeOff()">OFF</button>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<button onclick="logout()">Déconnexion</button>

</div>
</div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA3COCLo3bs_BknN4PLgtRo3nvG7rkae0k",
  authDomain: "sae-radio.firebaseapp.com",
  databaseURL: "https://sae-radio-default-rtdb.europe-west1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

// 🔐 LOGIN
function login(){
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  firebase.auth().signInWithEmailAndPassword(email, password)
    .catch(err => alert(err.message));
}

// 🔓 LOGOUT
function logout(){
  firebase.auth().signOut();
}

// 🔄 SESSION
firebase.auth().onAuthStateChanged(user => {
  if(user){
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
  } else {
    document.getElementById("login").style.display = "flex";
    document.getElementById("app").style.display = "none";
  }
});

// 📡 DATABASE
const db = firebase.database();

// GRAPH
let data = [];
let labels = [];

const chart = new Chart(document.getElementById("chart"), {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{ label: "Temp ESP32", data: data }]
  }
});

// ESP32
db.ref("capteurs/esp32").on("value", snap => {
  let v = snap.val();

  document.getElementById("tempESP").innerText = v.temperature;
  document.getElementById("humESP").innerText = v.humidity;

  labels.push(new Date().toLocaleTimeString());
  data.push(v.temperature);

  if(labels.length > 10){
    labels.shift();
    data.shift();
  }

  chart.update();
});

// MEGA
db.ref("capteurs/mega").on("value", snap => {
  let v = snap.val();

  document.getElementById("tempMega").innerText = v.temperature;
  document.getElementById("humMega").innerText = v.humidity;
});

// LAMPE
db.ref("lampe/etat").on("value", snap => {
  let etat = snap.val();
  document.getElementById("etatLampe").innerText = etat ? "ON" : "OFF";
});

// COMMANDES
function lampeOn(){ db.ref("lampe/etat").set(1); }
function lampeOff(){ db.ref("lampe/etat").set(0); }

</script>

</body>
</html>
